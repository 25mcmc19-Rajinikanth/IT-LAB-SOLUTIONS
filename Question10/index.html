<!DOCTYPE html>
<html>
<head>
    <title>Custom jQuery Tabs Plugin</title>

    
    <link rel="stylesheet" href="style.css">

  
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<h2>Dynamic Tab Navigation</h2>

<div id="myTabs">

    
    <ul class="tabs">
        <li data-tab="home">Home</li>
        <li data-tab="about">About</li>
        <li data-tab="contact">Contact</li>
    </ul>

    
    <div class="tab-content" id="home">
        <h3>Home Section</h3>
        <p>Welcome to the Home page.</p>
    </div>

    <div class="tab-content" id="about">
        <h3>About Section</h3>
        <p>This is About us section.</p>
    </div>

    <div class="tab-content" id="contact">
        <h3>Contact Section</h3>
        <p>Contact us at 25mcmc19@uohyd.ac.in</p>
    </div>

</div>


<script src="tabs-plugin.js"></script>

<script>
    
    $("#myTabs").simpleTabs({
        activeClass: "active-tab",
        animationSpeed: 400,
        defaultTab: "home"
    });
</script>

</body>
</html>
