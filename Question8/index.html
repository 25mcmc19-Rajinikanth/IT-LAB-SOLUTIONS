<!DOCTYPE html>
<html>
<head>
    <title>XML to JSON using jQuery</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        h2 {
            color: #333;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        select, input, button {
            padding: 6px;
            margin-right: 10px;
            margin-top: 10px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<h2>Book Catalog</h2>

<div>
    <label>Genre:</label>
    <select id="genreFilter">
        <option value="all">All</option>
    </select>

    <label>Author:</label>
    <select id="authorFilter">
        <option value="all">All</option>
    </select>

    <label>Min Price:</label>
    <input type="number" id="minPrice" placeholder="Min">

    <label>Max Price:</label>
    <input type="number" id="maxPrice" placeholder="Max">

    <button id="filterBtn">Apply Filter</button>
</div>

<table id="bookTable">
    <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Price</th>
            <th>Publish Date</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script src="script.js"></script>

</body>
</html>
