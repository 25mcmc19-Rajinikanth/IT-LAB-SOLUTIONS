<!DOCTYPE html>
<html>

<head>
    <title>Dynamic Registration Form</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
        }

        input,
        select {
            width: 250px;
            padding: 5px;
        }

        .error {
            color: red;
            font-size: 13px;
        }

        .hidden {
            display: none;
        }

        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <h2>Dynamic Registration Form</h2>

    <div id="formContainer"></div>


    <script src="script.js"></script>

</body>

</html>
